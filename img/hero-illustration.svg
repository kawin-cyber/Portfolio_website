<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-slight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g stroke="var(--accent, #22c55e)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Circuit Lines Background -->
    <path d="M 300 160 L 300 80 L 360 40" stroke-width="2" opacity="0.3"/>
    <circle cx="360" cy="40" r="4" fill="var(--accent, #22c55e)" opacity="0.3"/>
    
    <path d="M 421.2 230 L 480 200 L 520 240 L 520 300" stroke-width="2" opacity="0.3"/>
    <circle cx="520" cy="300" r="4" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <path d="M 421.2 370 L 480 400 L 480 460" stroke-width="2" opacity="0.3"/>
    <rect x="476" y="460" width="8" height="8" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <path d="M 300 440 L 300 520 L 240 560" stroke-width="2" opacity="0.3"/>
    <circle cx="240" cy="560" r="4" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <path d="M 178.8 370 L 120 400 L 80 360 L 80 300" stroke-width="2" opacity="0.3"/>
    <circle cx="80" cy="300" r="4" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <path d="M 178.8 230 L 120 200 L 120 140" stroke-width="2" opacity="0.3"/>
    <rect x="116" y="132" width="8" height="8" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <path d="M 380 180 L 440 140 L 500 140" stroke-width="1.5" opacity="0.2"/>
    <path d="M 220 180 L 160 140 L 100 140" stroke-width="1.5" opacity="0.2"/>
    <path d="M 380 420 L 440 460 L 500 460" stroke-width="1.5" opacity="0.2"/>
    <path d="M 220 420 L 160 460 L 100 460" stroke-width="1.5" opacity="0.2"/>

    <!-- Additional nodes and lines -->
    <circle cx="200" cy="100" r="2" fill="var(--accent, #22c55e)" opacity="0.5"/>
    <circle cx="400" cy="500" r="3" fill="var(--accent, #22c55e)" opacity="0.4"/>
    <circle cx="550" cy="200" r="2" fill="var(--accent, #22c55e)" opacity="0.3"/>
    <circle cx="50" cy="400" r="2" fill="var(--accent, #22c55e)" opacity="0.3"/>

    <!-- Outer Hexagon -->
    <polygon points="300,140 438.5,220 438.5,380 300,460 161.5,380 161.5,220" stroke-width="1" opacity="0.4" stroke-dasharray="10 5" />
    
    <!-- Inner Hexagon (Solid) -->
    <polygon points="300,160 421.2,230 421.2,370 300,440 178.8,370 178.8,230" stroke-width="3" filter="url(#glow-slight)" opacity="0.9"/>
    
    <!-- Innermost thin Hexagon -->
    <polygon points="300,180 403.9,240 403.9,360 300,420 196.1,360 196.1,240" stroke-width="1" opacity="0.3"/>

    <!-- Glowing Lock -->
    <g filter="url(#glow)">
      <!-- Lock Shackle -->
      <path d="M 265 290 V 250 C 265 230.67 280.67 215 300 215 C 319.33 215 335 230.67 335 250 V 290" stroke-width="12" opacity="0.9"/>
      
      <!-- Lock Body -->
      <rect x="250" y="290" width="100" height="80" rx="12" fill="var(--accent, #22c55e)" stroke="none" opacity="0.95"/>
      
      <!-- Keyhole -->
      <circle cx="300" cy="320" r="8" fill="var(--bg-primary, #0a0a0a)" stroke="none"/>
      <path d="M 296 325 L 293 345 L 307 345 L 304 325 Z" fill="var(--bg-primary, #0a0a0a)" stroke="none"/>
    </g>

    <!-- Floating Code Brackets / UI accents -->
    <path d="M 460 300 L 470 290 L 460 280" stroke-width="3" opacity="0.5"/>
    <path d="M 480 300 L 470 310 L 480 320" stroke-width="3" opacity="0.5"/>
    
    <path d="M 140 300 L 130 290 L 140 280" stroke-width="3" opacity="0.5"/>
    <path d="M 120 300 L 130 310 L 120 320" stroke-width="3" opacity="0.5"/>

  </g>
</svg>
